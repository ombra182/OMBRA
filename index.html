<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OMBRA</title>

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: white;
      font-family: Helvetica, sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 80px;
      letter-spacing: 8px;
      margin-top: 100px;
    }

    p {
      color: #aaa;
      max-width: 500px;
      margin: 20px auto;
    }

    .btn {
      margin-top: 30px;
      padding: 12px 25px;
      border: 1px solid white;
      display: inline-block;
      text-decoration: none;
      color: white;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    .gallery {
      margin-top: 80px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      height: auto;
    }

    .section {
      margin-top: 100px;
      padding: 20px;
    }
  </style>
</head>

<body>

  <h1>OMBRA</h1>
  <p>Black ink. Real stories. No noise.</p>

  <a href="https://www.instagram.com/ombratattoo/" class="btn">BOOK NOW</a>

  <div class="section">
    <h2>WORK</h2>
  </div>

  <div class="gallery">
    <img src="IMG_1360.jpeg">
    <img src="IMG_2534.JPG">
    <img src="IMG_5224.JPG">
    <img src="IMG_7354.JPG">
  </div>

  <div class="section">
    <h2>ABOUT</h2>
    <p>OMBRA is a creative project blending tattooing, music and raw visual storytelling. Every piece is designed to leave a mark.</p>
  </div>

</body>
</html>
