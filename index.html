<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OMBRA</title>

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: white;
      font-family: Helvetica, sans-serif;
      text-align: center;
      overflow-x: hidden;
    }

    h1 {
      font-size: 80px;
      letter-spacing: 8px;
      margin-top: 40px;
    }

    p {
      color: #aaa;
      max-width: 500px;
      margin: 20px auto;
    }

    .logo-top {
      margin-top: 20px;
    }

    .logo-top img {
      width: 80px;
      opacity: 0.9;
    }

    .btn {
      margin-top: 30px;
      padding: 15px 30px;
      border: none;
      background: red;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.8;
    }

    .gallery {
      margin-top: 80px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      height: auto;
    }

    .section {
      margin-top: 100px;
      padding: 20px;
    }

    .bg-logo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.05;
      z-index: -1;
    }

    .bg-logo img {
      width: 500px;
    }

    iframe {
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <!-- LOGO BACKGROUND -->
  <div class="bg-logo">
    <img src="logo.png.PNG">
  </div>

  <!-- LOGO TOP -->
  <div class="logo-top">
    <img src="logo.png.PNG" alt="Ombra Logo">
  </div>

  <!-- HERO -->
  <h1>OMBRA</h1>
  <p>Black Ink. Real Stories. No Noise.</p>

  <!-- BUTTON -->
  <a href="https://instagram.com/TUOUSERNAME" target="_blank">
    <button class="btn">BOOK APPOINTMENT</button>
  </a>

  <!-- WORK -->
  <div class="section">
    <h2 style="color:red;">WORK</h2>
  </div>

  <div class="gallery">
    <img src="IMG_1360.jpeg">
    <img src="IMG_2534.JPG">
    <img src="IMG_5224.JPG">
    <img src="IMG_7354.JPG">
  </div>

  <!-- ABOUT -->
  <div class="section">
    <h2 style="color:red;">ABOUT</h2>
    <p>
      Ombra is not just a tattoo.<br>
      It's a story carved in black.<br><br>
      Melbourne based artist.
    </p>
  </div>

  <!-- MUSIC -->
  <div class="section">
    <h2 style="color:red;">MUSIC</h2>

    <iframe style="border-radius:12px"
      src="https://open.spotify.com/embed/artist/3tJNxQA0mCn22uO3lC8mOW"
      width="300"
      height="80"
      frameBorder="0"
      allow="autoplay; clipboard-write; encrypted-media;">
    </iframe>

  </div>

  <!-- CTA -->
  <div class="section">
    <p>Ready to wear your story?</p>
    <a href="https://instagram.com/TUOUSERNAME" target="_blank">
      <button class="btn">BOOK NOW</button>
    </a>
  </div>

</body>
</html>
