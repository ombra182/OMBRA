<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OMBRA</title>
  <meta name="description" content="Ombra Tattoos - Melbourne tattoo artist blending ink, music, and visual storytelling.">

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: white;
      font-family: Helvetica, sans-serif;
      text-align: center;
      overflow-x: hidden;
    }

    h1 { font-size: 80px; letter-spacing: 8px; margin-top: 40px; }
    h2 { letter-spacing: 3px; }
    p { color: #aaa; max-width: 500px; margin: 20px auto; line-height: 1.5; }

    .logo-top { margin-top: 20px; }
    .logo-top img { width: 80px; opacity: 0.9; }

    .btn {
      margin-top: 30px;
      padding: 15px 30px;
      border: none;
      background: red;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }
    .btn:hover { opacity: 0.8; transform: scale(1.05); }

    .gallery { margin-top: 80px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
    .gallery-item { position: relative; overflow: hidden; cursor: pointer; border-radius: 5px; }
    .gallery-item img { width: 100%; height: auto; transition: transform 0.5s ease, filter 0.5s ease; display: block; }
    .gallery-item:hover img { transform: scale(1.05); filter: brightness(70%) sepia(20%) hue-rotate(-20deg); }

    .section {
      margin-top: 100px;
      padding: 20px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 1s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

    .bg-logo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.05;
      z-index: -1;
      max-width: 80vw;
      transition: transform 0.3s ease;
    }

    iframe { margin-top: 30px; max-width: 100%; }

    input, textarea {
      background: #111;
      border: 1px solid #333;
      color: white;
      width: 80%;
      margin: 5px;
      padding: 10px;
      border-radius: 5px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 50px; }
      .gallery { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

  <!-- BACKGROUND LOGO (parallax) -->
  <div class="bg-logo" id="bgLogo">
    <img src="logo.png.PNG" alt="Ombra Logo Background">
  </div>

  <!-- TOP LOGO -->
  <div class="logo-top">
    <img src="logo.png.PNG" alt="Ombra Logo">
  </div>

  <!-- HERO -->
  <h1>OMBRA</h1>
  <p>Black Ink. Real Stories. No Noise.</p>

  <!-- BOOK BUTTON (DM DIRECT) -->
  <a href="https://instagram.com/ombratattoo" target="_blank">
    <button class="btn">BOOK APPOINTMENT</button>
  </a>

  <!-- WORK -->
  <div class="section">
    <h2 style="color:red;">WORK</h2>
  </div>

  <div class="gallery">
    <div class="gallery-item"><img src="IMG_1360.jpeg" alt="Tattoo work 1"></div>
    <div class="gallery-item"><img src="IMG_2534.JPG" alt="Tattoo work 2"></div>
    <div class="gallery-item"><img src="IMG_5224.JPG" alt="Tattoo work 3"></div>
    <div class="gallery-item"><img src="IMG_7354.JPG" alt="Tattoo work 4"></div>
  </div>

  <!-- ABOUT -->
  <div class="section">
    <h2 style="color:red;">ABOUT</h2>
    <p>
      Ombra is not just a tattoo.<br>
      It's a story carved in black.<br><br>
      Melbourne based artist blending tattooing, music and visual storytelling.
    </p>
  </div>

  <!-- MUSIC -->
  <div class="section">
    <h2 style="color:red;">LATEST RELEASE</h2>

    <iframe style="border-radius:12px"
      src="https://open.spotify.com/embed/artist/3tJNxQA0mCn22uO3lC8mOW"
      width="300"
      height="80"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media;">
    </iframe>

    <p style="color:#666;">Listen to Emmeombra on Spotify</p>
  </div>

  <!-- BOOKING FORM -->
  <div class="section">
    <h2 style="color:red;">BOOKING</h2>

    <form action="https://formsubmit.co/ombratatt@gmail.com" method="POST">
      <input type="hidden" name="_captcha" value="false">
      <input type="text" name="name" placeholder="Your name" required><br>
      <input type="text" name="idea" placeholder="Tattoo idea" required><br>
      <input type="text" name="budget" placeholder="Budget"><br>
      <textarea name="message" placeholder="Tell me more..."></textarea><br>

      <button class="btn" type="submit">SEND REQUEST</button>
    </form>
  </div>

  <!-- FINAL CTA -->
  <div class="section">
    <p>Ready to wear your story?</p>
    <a href="https://instagram.com/ombratattoo" target="_blank">
      <button class="btn">BOOK NOW</button>
    </a>
  </div>

  <!-- FOOTER -->
  <div class="section">
    <img src="logo.png.PNG" style="width:40px; opacity:0.6;" alt="Ombra Logo">
    <p style="color:#444;">OMBRA • Melbourne</p>
  </div>

  <!-- PARALLAX & SCROLL ANIMATIONS -->
  <script>
    const bgLogo = document.getElementById('bgLogo');
    window.addEventListener('scroll', () => {
      let offset = window.scrollY;
      bgLogo.style.transform = `translate(-50%, calc(-50% + ${offset * 0.2}px))`;
    });

    const sections = document.querySelectorAll('.section');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if(entry.isIntersecting) entry.target.style.opacity = 1;
      });
    }, { threshold: 0.1 });
    sections.forEach(section => observer.observe(section));
  </script>

</body>
</html>
